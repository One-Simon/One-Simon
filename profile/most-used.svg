<svg width="520" height="246" viewBox="0 0 520 246" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Most Used Languages</title>
  <desc id="desc">Language usage by GitHub language byte counts across repositories available to the token.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .card-bg { fill: #f6f8fa; stroke: #d0d7de; }
    .title { fill: #24292f; font-size: 18px; font-weight: 600; }
    .meta { fill: #57606a; font-size: 12px; font-weight: 600; }
    .name { fill: #24292f; font-size: 13px; font-weight: 600; }
    .value { fill: #57606a; font-size: 12px; }
    @media (prefers-color-scheme: dark) {
      .card-bg { fill: #161b22; stroke: #30363d; }
      .title, .name { fill: #c9d1d9; }
      .meta, .value { fill: #8b949e; }
    }
  </style>
  <rect x="0.5" y="0.5" width="519" height="245" rx="8" class="card-bg" />
  <text x="18" y="30" class="title">Most Used Languages</text>
  <text x="502" y="30" text-anchor="end" class="meta">all-time</text>
  <clipPath id="bar"><rect x="18" y="54" width="484" height="10" rx="5" /></clipPath>
  <g clip-path="url(#bar)">
    <rect x="18" y="54" width="484" height="10" fill="#d0d7de" />
    <rect x="18.00" y="54" width="187.19" height="10" fill="#3178c6" />
    <rect x="205.19" y="54" width="109.18" height="10" fill="#178600" />
    <rect x="314.36" y="54" width="102.98" height="10" fill="#f1e05a" />
    <rect x="417.34" y="54" width="41.30" height="10" fill="#3572A5" />
    <rect x="458.63" y="54" width="28.66" height="10" fill="#dea584" />
    <rect x="487.30" y="54" width="14.70" height="10" fill="#8b949e" />
  </g>
  <g transform="translate(18 92)">
      <circle cx="5" cy="-4" r="5" fill="#3178c6" />
      <text x="18" y="0" class="name">TypeScript</text>
      <text x="484" y="0" text-anchor="end" class="value">38.7%</text>
    </g>
    <g transform="translate(18 120)">
      <circle cx="5" cy="-4" r="5" fill="#178600" />
      <text x="18" y="0" class="name">C#</text>
      <text x="484" y="0" text-anchor="end" class="value">22.6%</text>
    </g>
    <g transform="translate(18 148)">
      <circle cx="5" cy="-4" r="5" fill="#f1e05a" />
      <text x="18" y="0" class="name">JavaScript</text>
      <text x="484" y="0" text-anchor="end" class="value">21.3%</text>
    </g>
    <g transform="translate(18 176)">
      <circle cx="5" cy="-4" r="5" fill="#3572A5" />
      <text x="18" y="0" class="name">Python</text>
      <text x="484" y="0" text-anchor="end" class="value">8.5%</text>
    </g>
    <g transform="translate(18 204)">
      <circle cx="5" cy="-4" r="5" fill="#dea584" />
      <text x="18" y="0" class="name">Rust</text>
      <text x="484" y="0" text-anchor="end" class="value">5.9%</text>
    </g>
    <g transform="translate(18 232)">
      <circle cx="5" cy="-4" r="5" fill="#8b949e" />
      <text x="18" y="0" class="name">Other</text>
      <text x="484" y="0" text-anchor="end" class="value">3.0%</text>
    </g>
</svg>
