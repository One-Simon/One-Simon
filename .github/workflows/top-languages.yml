name: Top Languages

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate top languages card
        uses: One-Simon/GitStats@main
        with:
          token: ${{ secrets.README_STATS_TOKEN }}
          username: One-Simon
          output: profile/languages.svg
          max-languages: 10
          hide-languages: HTML,CSS

      - name: Commit generated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/languages.svg
          git commit -m "Update language card" || exit 0
          git push
