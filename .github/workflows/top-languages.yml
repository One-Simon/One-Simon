name: Top Languages

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: >-
            username=One-Simon
            &layout=compact
            &langs_count=10
            &hide=html,css
            &theme=transparent
            &hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      - name: Commit generated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/top-langs.svg
          git commit -m "Update top languages card" || exit 0
          git push
