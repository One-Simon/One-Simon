name: Top Languages

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate top languages card
        env:
          README_STATS_TOKEN: ${{ secrets.README_STATS_TOKEN }}
          GITHUB_USERNAME: One-Simon
          OUTPUT: profile/languages.svg
          MAX_LANGUAGES: "10"
          HIDE_LANGUAGES: HTML,CSS
        run: node scripts/generate-top-langs.mjs

      - name: Commit generated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/languages.svg
          git commit -m "Update language card" || exit 0
          git push
