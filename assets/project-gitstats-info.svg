<svg width="520" height="246" viewBox="0 0 520 246" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitStats</title>
  <desc id="desc">GitHub Action for README statistics, analytics usage, done status, MIT licence.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .title { fill: #f0f6fc; font-size: 24px; font-weight: 700; }
    .body { fill: #c9d1d9; font-size: 15px; font-weight: 500; }
    .muted { fill: #8b949e; font-size: 13px; font-weight: 500; }
    .badge-text { fill: #ffffff; font-size: 11px; font-weight: 700; }
  </style>
  <rect x="0.5" y="0.5" width="519" height="245" rx="14" fill="#0d1117" stroke="#30363d"/>

  <text class="title" x="22" y="40">GitStats</text>

  <g transform="translate(398 21)">
    <rect width="100" height="24" rx="6" fill="#24292f"/>
    <rect x="55" width="45" height="24" rx="6" fill="#2EA44F"/>
    <path d="M55 0h7v24h-7z" fill="#2EA44F"/>
    <text class="badge-text" x="14" y="16">Repo</text>
    <text class="badge-text" x="73" y="16">&#8599;</text>
  </g>

  <g transform="translate(22 66)">
    <g>
      <rect width="128" height="22" rx="5" fill="#24292f"/>
      <rect x="52" width="76" height="22" rx="5" fill="#D97706"/>
      <path d="M52 0h7v22h-7z" fill="#D97706"/>
      <text class="badge-text" x="10" y="15">Usage</text>
      <text class="badge-text" x="66" y="15">Analytics</text>
    </g>
    <g transform="translate(138 0)">
      <rect width="104" height="22" rx="5" fill="#24292f"/>
      <rect x="62" width="42" height="22" rx="5" fill="#F7B731"/>
      <path d="M62 0h7v22h-7z" fill="#F7B731"/>
      <text class="badge-text" x="10" y="15">Licence</text>
      <text class="badge-text" x="75" y="15">MIT</text>
    </g>
    <g transform="translate(252 0)">
      <rect width="103" height="22" rx="5" fill="#24292f"/>
      <rect x="52" width="51" height="22" rx="5" fill="#2EA44F"/>
      <path d="M52 0h7v22h-7z" fill="#2EA44F"/>
      <text class="badge-text" x="10" y="15">Status</text>
      <text class="badge-text" x="65" y="15">Done</text>
    </g>
  </g>

  <text class="body" x="22" y="121">Fully configurable language breakdown cards for GitHub profile READMEs.</text>
  <text class="body" x="22" y="147">README-driven config blocks generate managed SVG cards for all-time</text>
  <text class="body" x="22" y="173">language bytes or recent activity windows with normal and compact styles.</text>

  <g transform="translate(22 203)">
    <g>
      <rect width="118" height="22" rx="5" fill="#24292f"/>
      <rect x="55" width="63" height="22" rx="5" fill="#2088FF"/>
      <path d="M55 0h7v22h-7z" fill="#2088FF"/>
      <text class="badge-text" x="10" y="15">GitHub</text>
      <text class="badge-text" x="69" y="15">Action</text>
    </g>
    <g transform="translate(128 0)">
      <rect width="148" height="22" rx="5" fill="#24292f"/>
      <rect x="62" width="86" height="22" rx="5" fill="#2EA44F"/>
      <path d="M62 0h7v22h-7z" fill="#2EA44F"/>
      <text class="badge-text" x="10" y="15">README</text>
      <text class="badge-text" x="76" y="15">Statistics</text>
    </g>
  </g>
</svg>
